<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Gaming Hub</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #282c34; color: white; text-align: center; }
        h1 { color: #61dafb; }
        #clock { font-size: 2em; }
        .neon { text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 15px #ff00ff; }
        .status-indicator { display: inline-block; width: 20px; height: 20px; border-radius: 50%; margin: 10px; }
        .online { background-color: green; }
        .offline { background-color: red; }
        #features { display: flex; justify-content: space-around; margin: 20px; }
        .feature { padding: 10px; }
        #whatsapp-btn { background-color: #25D366; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        #whatsapp-btn:hover { background-color: #128C7E; }
    </style>
    <script>
        function updateClock() {
            const now = new Date();
            const utcDateTime = now.toUTCString();
            document.getElementById('clock').innerText = utcDateTime;
        }
        setInterval(updateClock, 1000);
    </script>
</head>
<body>
    <h1 class="neon">Welcome to the Modern Gaming Hub</h1>
    <div id="clock"></div>
    <div class="status-indicator online"></div>
    <div class="status-indicator offline"></div>
    <div id="features">
        <div class="feature">Feature 1: Real-time updates</div>
        <div class="feature">Feature 2: Neon Effects</div>
        <div class="feature">Feature 3: Status Indicator</div>
    </div>
    <button id="whatsapp-btn" onclick="window.open('https://wa.me/your-number','_blank')">Contact on WhatsApp</button>
    <script>updateClock();</script>
</body>
</html>
